services:
  pulse:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SPACETIMEDB_URL: ${NEXT_PUBLIC_SPACETIMEDB_URL:-wss://maincloud.spacetimedb.com}
        NEXT_PUBLIC_SPACETIMEDB_MODULE: ${NEXT_PUBLIC_SPACETIMEDB_MODULE:-pulse}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://pulse.venoms.app}
        NEXT_PUBLIC_DEEPGRAM_MODEL: ${NEXT_PUBLIC_DEEPGRAM_MODEL:-nova-2}
        NEXT_PUBLIC_DEEPGRAM_LANGUAGE: ${NEXT_PUBLIC_DEEPGRAM_LANGUAGE:-en-US}
        NEXT_PUBLIC_DEEPGRAM_API_KEY: ${NEXT_PUBLIC_DEEPGRAM_API_KEY}
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/session?sessionId=healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
